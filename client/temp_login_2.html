<style>
    body {
      background-color: #131315;
      background-image: radial-gradient(circle at top right, #4f46e533, transparent),
                        radial-gradient(circle at bottom left, #00a2e622, transparent);
      min-height: 100vh;
    }
    .glass-card {
      background: rgba(32, 31, 33, 0.7);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .input-focus:focus {
      border-color: #c3c0ff;
      box-shadow: 0 0 0 4px rgba(195, 192, 255, 0.1);
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

<body class="flex items-center justify-center p-gutter">
<main class="w-full max-w-[440px] z-10">
<div class="glass-card rounded-xl p-lg shadow-2xl space-y-lg">
<!-- Brand & Header Section -->
<div class="flex flex-col items-center text-center space-y-md">
<div class="relative group">
<div class="absolute -inset-1 bg-gradient-to-tr from-primary-container to-secondary rounded-full blur opacity-25 group-hover:opacity-50 transition duration-1000 group-hover:duration-200"></div>
<div class="relative h-20 w-20 rounded-full bg-surface-container-high border border-outline-variant/30 overflow-hidden flex items-center justify-center">
<img alt="Logo" class="w-full h-full object-cover opacity-90" data-alt="A sophisticated and minimalist circular logo emblem for a high-end travel brand. The center features a stylized, ethereal white paper plane or compass needle against a deep indigo and midnight blue backdrop. The aesthetic is clean, professional, and visionary, perfectly matching a dark mode interface for luxury travel planning. Soft lighting highlights the subtle textures of the emblem." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD3t0Pu5JO9bFM0Rf_dOP8-wbkchc7FyC5mJiIED2HW2cC9gPVeDAz0_N4WmTkRrQfIVbO2KdiN2d5EUdEth0VDLC30mcV0GYBbOI2_ZmJJUPdIRcpj_TZzgsV1_A_UPBPVxxzaWao_TGJPqlkcCFX4qh8eqBJT3haw9vwdlrVs3BofLNu_jOw9oAQxD0HY6qdHm4l4Tm3BThNjSqJLF2hn6CxkY0ESX1QJM5IfqJBVQERLptWplKJfXW77uji3e3Sig2Qwg5aA1CnK"/>
</div>
</div>
<div class="space-y-xs">
<h1 class="font-headline-xl text-headline-xl text-on-surface tracking-tight">Traveloop</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to your premium travel workspace</p>
</div>
</div>
<!-- Authentication Form -->
<form action="#" class="space-y-gutter" onsubmit="return false">
<div class="space-y-base">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="username">Email or Username</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]" data-icon="alternate_email">alternate_email</span>
</div>
<input class="block w-full pl-[44px] pr-md py-sm bg-surface-container-lowest border border-outline-variant/50 rounded-lg text-on-surface placeholder:text-outline/50 font-body-md input-focus transition-all duration-200 outline-none" id="username" name="username" placeholder="alex@example.com" type="text"/>
</div>
</div>
<div class="space-y-base">
<div class="flex justify-between items-center px-1">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:text-primary-fixed-dim transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-[44px] pr-md py-sm bg-surface-container-lowest border border-outline-variant/50 rounded-lg text-on-surface placeholder:text-outline/50 font-body-md input-focus transition-all duration-200 outline-none" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex items-center space-x-base ml-1">
<input class="w-4 h-4 rounded border-outline-variant bg-surface-container-highest text-primary-container focus:ring-primary focus:ring-offset-surface outline-none cursor-pointer" id="remember" type="checkbox"/>
<label class="font-label-sm text-label-sm text-on-surface-variant cursor-pointer select-none" for="remember">Stay signed in for 30 days</label>
</div>
<button class="w-full py-sm px-gutter bg-gradient-to-r from-primary-container to-inverse-primary hover:opacity-90 active:scale-[0.98] transition-all duration-200 text-on-primary font-headline-lg-mobile text-headline-lg-mobile rounded-lg shadow-lg shadow-primary-container/20 flex items-center justify-center space-x-base" type="submit">
<span>Log In</span>
<span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Footer Actions -->
<div class="pt-md border-t border-outline-variant/20 flex flex-col items-center space-y-md">
<p class="font-body-md text-body-md text-on-surface-variant">
          New to Traveloop? 
          <a class="text-secondary font-label-md hover:underline decoration-secondary/30 transition-all" href="#">Create an account</a>
</p>
<div class="flex items-center space-x-md w-full opacity-60">
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
<span class="font-label-sm text-label-sm text-outline uppercase tracking-widest">or continue with</span>
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
</div>
<div class="grid grid-cols-2 gap-md w-full">
<button class="flex items-center justify-center space-x-base py-base px-md rounded-lg glass-card hover:bg-surface-variant/50 transition-colors">
<img alt="Google" class="w-5 h-5 grayscale opacity-70 group-hover:grayscale-0" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB90pE4zgk7HraY2dUychPFRX1dNJoILcHZIK3yoX_9hXh8_v3HOC_JNb9RxqaXyTAgpQgN_uVPsmh1ZlgVsuKJndjangDZL8XnxHw3Tha_uM_3tJdsgGEoAYCax7owGVWtpVtec_FmhpzFrW_DltV5oZ5fbmFdoMJfDm6ivUOrrGyQqDG6YhwQjB7HzpsUE0mySZI6XC5WfPjXUNLc2hJXYVbyNSQ5fQxx6T3TfRwKGxfCSLrgYCoFPdHEKjUlOvC3qgDNuuccoVuJ"/>
<span class="font-label-sm text-label-sm text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center space-x-base py-base px-md rounded-lg glass-card hover:bg-surface-variant/50 transition-colors">
<span class="material-symbols-outlined text-on-surface text-[20px]" data-icon="apple">ios</span>
<span class="font-label-sm text-label-sm text-on-surface">Apple</span>
</button>
</div>
</div>
</div>
<!-- Legal & Help -->
<div class="mt-lg flex justify-between items-center px-sm opacity-40 hover:opacity-80 transition-opacity">
<div class="flex space-x-md">
<a class="font-label-sm text-label-sm text-on-surface hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="font-label-sm text-label-sm text-on-surface hover:text-primary transition-colors" href="#">Terms of Service</a>
</div>
<button class="flex items-center space-x-xs font-label-sm text-label-sm text-on-surface hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[16px]" data-icon="help">help</span>
<span>Support</span>
</button>
</div>
</main>
<!-- Ambient Decorative Elements -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none overflow-hidden z-0">
<div class="absolute top-[10%] left-[5%] w-[400px] h-[400px] bg-primary-container/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[10%] right-[5%] w-[500px] h-[500px] bg-secondary-container/10 rounded-full blur-[150px]"></div>
</div>
</body></html>
